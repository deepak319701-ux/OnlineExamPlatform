{% extends 'base.html' %}

{% block title %}
{{ exam.title }}
{% endblock %}

{% block content %}

<div class="container">

    <h2 class="mb-4">{{ exam.title }}</h2>

    <form method="POST">

        {% csrf_token %}

        {% for question in questions %}

        <div class="card mb-4">

            <div class="card-body">

                <h5>
                    Q{{ forloop.counter }}. {{ question.question }}
                </h5>

                <hr>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="question_{{ question.id }}"
                           value="A">
                    <label class="form-check-label">
                        {{ question.option_a }}
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="question_{{ question.id }}"
                           value="B">
                    <label class="form-check-label">
                        {{ question.option_b }}
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="question_{{ question.id }}"
                           value="C">
                    <label class="form-check-label">
                        {{ question.option_c }}
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="question_{{ question.id }}"
                           value="D">
                    <label class="form-check-label">
                        {{ question.option_d }}
                    </label>
                </div>

            </div>

        </div>

        {% endfor %}

        <button type="submit"
                class="btn btn-success btn-lg">

            Submit Exam

        </button>

    </form>

</div>

{% endblock %}
