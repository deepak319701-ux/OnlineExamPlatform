{% extends 'base.html' %}

{% block title %}
{{ exam.title }}
{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>{{ exam.title }}</h2>
<div class="alert alert-danger text-center fs-4 fw-bold">

    Time Left:
    <span id="timer">
        {{ exam.duration }}:00
    </span>

</div>

<hr>

<form method="POST">

{% csrf_token %}

{% for question in questions %}

<div class="card mb-3">

<div class="card-body">

<h5>
Q{{ forloop.counter }}.
{{ question.question }}
</h5>

<hr>

<div class="form-check">
<input type="radio"
       name="question_{{ question.id }}"
       value="A"
       class="form-check-input">
<label class="form-check-label">
{{ question.option_a }}
</label>
</div>

<div class="form-check">
<input type="radio"
       name="question_{{ question.id }}"
       value="B"
       class="form-check-input">
<label class="form-check-label">
{{ question.option_b }}
</label>
</div>

<div class="form-check">
<input type="radio"
       name="question_{{ question.id }}"
       value="C"
       class="form-check-input">
<label class="form-check-label">
{{ question.option_c }}
</label>
</div>

<div class="form-check">
<input type="radio"
       name="question_{{ question.id }}"
       value="D"
       class="form-check-input">
<label class="form-check-label">
{{ question.option_d }}
</label>
</div>

</div>

</div>

{% endfor %}

<button type="submit"
        class="btn btn-success">

Submit Exam

</button>

</form>

</div>
<script>

let totalSeconds = {{ exam.duration }} * 60;

const timer = document.getElementById("timer");
const form = document.querySelector("form");

function updateTimer() {

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    timer.innerHTML =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');

    if (totalSeconds <= 0) {

        clearInterval(interval);

        alert("Time is over! Exam Submitted.");

        form.submit();

    }

    totalSeconds--;

}

updateTimer();

const interval = setInterval(updateTimer, 1000);

</script>
{% endblock %}
